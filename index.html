<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<!-- PWA settings -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clock">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1518">

<title>Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a1518;
    font-family: 'Amazon Ember', 'Helvetica Neue', Arial, sans-serif;
    color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
  }

  .container {
    width: 100vw;
    height: 100vh;
    /* 静的なメタリック背景 - 多層グラデーション */
    background:
      radial-gradient(ellipse 60% 40% at 30% 15%, rgba(160, 200, 215, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 75% 85%, rgba(50, 100, 130, 0.25) 0%, transparent 65%),
      radial-gradient(ellipse 80% 50% at 50% 50%, rgba(70, 120, 145, 0.15) 0%, transparent 70%),
      linear-gradient(180deg,
        #0a1518 0%,
        #15252c 25%,
        #243a44 50%,
        #1c2f38 75%,
        #0f1c22 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    overflow: hidden;
  }

  /* 鏡面反射の質感（静的レイヤー） */
  .surface {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    background:
      /* 上からの光 */
      linear-gradient(180deg, rgba(220, 235, 240, 0.08) 0%, transparent 30%),
      /* 細かい質感 */
      repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 2px,
        rgba(255, 255, 255, 0.012) 2px,
        rgba(255, 255, 255, 0.012) 3px
      );
  }

  /* グレア（光のオーバーレイ） */
  .glare {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse 90% 50% at 50% -10%, rgba(200, 220, 230, 0.15) 0%, transparent 70%),
      radial-gradient(ellipse 70% 40% at 50% 110%, rgba(40, 70, 85, 0.35) 0%, transparent 70%);
    mix-blend-mode: overlay;
  }

  /* インタラクション用のキャンバス（カーソル追従の波紋） */
  .ripple-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: calc(56px + env(safe-area-inset-top));
    padding-top: env(safe-area-inset-top);
    padding-left: calc(32px + env(safe-area-inset-left));
    padding-right: calc(32px + env(safe-area-inset-right));
    background: linear-gradient(180deg, rgba(15, 25, 30, 0.7) 0%, rgba(15, 25, 30, 0.3) 100%);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    display: flex;
    align-items: center;
    z-index: 10;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08) inset;
  }

  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(180deg, #ffffff 0%, #b8c8d0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
  }

  /* メインコンテンツを完全中央に */
  .main-content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 3;
    gap: 40px;
  }

  .clock-wrapper {
    text-align: center;
    -webkit-user-select: none;
    user-select: none;
  }

  .timezone-label {
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 24px;
    font-weight: 700;
    background: linear-gradient(180deg, #ffffff 0%, #a8b8c0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 16px rgba(0, 0, 0, 0.4);
    opacity: 0.95;
  }

  .time {
    font-size: 180px;
    font-weight: 600;
    letter-spacing: -4px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    display: flex;
    justify-content: center;
    align-items: baseline;
    background: linear-gradient(180deg,
      #ffffff 0%,
      #e8eef0 25%,
      #c0d0d8 50%,
      #e8eef0 75%,
      #ffffff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 24px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 60px rgba(125, 211, 232, 0.15));
  }

  .time .colon {
  margin: 0 8px;
  font-weight: 500;
}

  .date-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-top: 32px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(180deg, #ffffff 0%, #b8c8d0 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
  }

  .date-row .divider {
    width: 5px;
    height: 5px;
    background: linear-gradient(180deg, #7dd3e8, #4ea8c0);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(125, 211, 232, 0.6);
  }

  /* === To Do panel (desktop only) === */
  .todo-panel {
    display: none;
    width: min(640px, 80vw);
    max-height: 28vh;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.04) 100%);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 16px;
    padding: 20px 24px;
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.4),
      0 1px 0 rgba(255, 255, 255, 0.15) inset,
      0 -1px 0 rgba(0, 0, 0, 0.2) inset;
    flex-direction: column;
  }

  .todo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .todo-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    color: #FFFFFF;
    opacity: 0.85;
  }

  .todo-count {
    font-size: 11px;
    letter-spacing: 1px;
    color: #FFFFFF;
    opacity: 0.6;
    font-weight: 500;
  }

  .todo-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .todo-input {
    flex: 1;
    border: none;
    border-bottom: 1.5px solid rgba(255, 255, 255, 0.2);
    padding: 8px 4px;
    font-size: 15px;
    font-family: inherit;
    color: #FFFFFF;
    background: transparent;
    outline: none;
    transition: border-color 0.2s;
  }

  .todo-input:focus {
    border-bottom-color: #7dd3e8;
  }

  .todo-input::placeholder {
    color: rgba(255, 255, 255, 0.35);
  }

  .todo-add-btn {
    border: none;
    background: linear-gradient(180deg, #7dd3e8 0%, #4ea8c0 100%);
    color: #0a1518;
    padding: 0 16px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(125, 211, 232, 0.3), 0 1px 0 rgba(255, 255, 255, 0.4) inset;
  }

  .todo-add-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(125, 211, 232, 0.4), 0 1px 0 rgba(255, 255, 255, 0.4) inset;
  }

  .todo-add-btn:active {
    transform: translateY(1px);
  }

  .todo-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    margin: 0 -8px;
    padding: 0 8px;
  }

  .todo-list::-webkit-scrollbar {
    width: 6px;
  }

  .todo-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 4px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 14px;
    color: #FFFFFF;
    transition: opacity 0.2s;
  }

  .todo-item:last-child {
    border-bottom: none;
  }

  .todo-checkbox {
    width: 18px;
    height: 18px;
    border: 1.5px solid rgba(255, 255, 255, 0.35);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: transparent;
  }

  .todo-checkbox:hover {
    border-color: #7dd3e8;
  }

  .todo-checkbox.checked {
    background: linear-gradient(180deg, #7dd3e8, #4ea8c0);
    border-color: #7dd3e8;
    box-shadow: 0 0 8px rgba(125, 211, 232, 0.5);
  }

  .todo-checkbox.checked::after {
    content: '';
    width: 5px;
    height: 9px;
    border: solid #0a1518;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .todo-text {
    flex: 1;
    word-break: break-word;
    transition: opacity 0.2s;
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    opacity: 0.4;
  }

  .todo-delete {
    border: none;
    background: transparent;
    color: rgba(255, 255, 255, 0.35);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.15s;
    font-family: inherit;
    flex-shrink: 0;
  }

  .todo-delete:hover {
    color: #ff6b6b;
    background: rgba(255, 107, 107, 0.12);
  }

  .todo-empty {
    text-align: center;
    padding: 16px 0;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.4);
    font-style: italic;
  }

  /* デスクトップ表示時のみTo Doパネルを表示 */
  @media (min-width: 1024px) and (min-height: 700px) {
    .todo-panel {
      display: flex;
    }
  }

  @media (max-width: 900px) {
    .time { font-size: 110px; letter-spacing: -3px; }
    .date-row { font-size: 14px; gap: 16px; }
  }

  @media (max-width: 500px) {
    .time { font-size: 72px; letter-spacing: -2px; }
    .timezone-label { font-size: 18px; }
    .top-bar { padding-left: calc(16px + env(safe-area-inset-left)); padding-right: calc(16px + env(safe-area-inset-right)); }
  }

  /* === Landscape (横向き) optimization === */
  @media (orientation: landscape) and (max-height: 500px) {
    .top-bar {
      height: calc(28px + env(safe-area-inset-top));
      padding-left: calc(20px + env(safe-area-inset-left));
      padding-right: calc(20px + env(safe-area-inset-right));
    }

    .logo {
      font-size: 14px;
    }

    .time {
      font-size: 140px;
      letter-spacing: -3px;
    }

    .timezone-label {
      font-size: 18px;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .date-row {
      font-size: 13px;
      margin-top: 16px;
      gap: 14px;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="surface"></div>
  <div class="glare"></div>
  <canvas class="ripple-canvas" id="ripple"></canvas>

  <div class="top-bar">
    <div class="logo">Tokyo</div>
  </div>

  <div class="main-content">
    <div class="clock-wrapper">
      <div class="timezone-label">今日も1日頑張って！！</div>
      <div class="time">
        <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span><span class="colon">:</span><span id="seconds">00</span>
      </div>
      <div class="date-row">
        <span id="date">2026年5月5日</span>
        <span class="divider"></span>
        <span class="weekday" id="weekday">火曜日</span>
        <span class="divider"></span>
        <span id="week">Week 19</span>
      </div>
    </div>

    <div class="todo-panel">
      <div class="todo-header">
        <div class="todo-title">Today's To Do</div>
        <div class="todo-count" id="todo-count">0 / 0</div>
      </div>
      <div class="todo-input-row">
        <input type="text" class="todo-input" id="todo-input" placeholder="新しいタスクを入力してEnter..." maxlength="120">
        <button class="todo-add-btn" id="todo-add-btn">追加</button>
      </div>
      <ul class="todo-list" id="todo-list"></ul>
    </div>
  </div>
</div>

<script>
  // ============ Clock ============
  const weekdays = ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'];

  function getJSTDate() {
    const now = new Date();
    const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    return new Date(utc + (9 * 3600000));
  }

  function getWeekNumber(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  }

  function pad(n) {
    return n.toString().padStart(2, '0');
  }

  function update() {
    const d = getJSTDate();
    document.getElementById('hours').textContent = pad(d.getHours());
    document.getElementById('minutes').textContent = pad(d.getMinutes());
    document.getElementById('seconds').textContent = pad(d.getSeconds());
    document.getElementById('date').textContent = `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    document.getElementById('weekday').textContent = weekdays[d.getDay()];
    document.getElementById('week').textContent = `Week ${getWeekNumber(d)}`;
  }
  update();
  setInterval(update, 1000);

  // ============ カーソル追従の波紋（メタリック版） ============
  const rippleCanvas = document.getElementById('ripple');
  const rippleCtx = rippleCanvas.getContext('2d');

  function resizeRipple() {
    rippleCanvas.width = window.innerWidth * window.devicePixelRatio;
    rippleCanvas.height = window.innerHeight * window.devicePixelRatio;
    rippleCanvas.style.width = window.innerWidth + 'px';
    rippleCanvas.style.height = window.innerHeight + 'px';
    rippleCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  resizeRipple();
  window.addEventListener('resize', resizeRipple);

  const ripples = [];
  let lastRippleTime = 0;
  let lastMouseX = -100;
  let lastMouseY = -100;
  let isAnimating = false;

  function addRipple(x, y, strong = false) {
    ripples.push({
      x: x,
      y: y,
      radius: 0,
      maxRadius: strong ? 350 : 220,
      opacity: strong ? 0.7 : 0.45,
      speed: strong ? 2.8 : 2.0
    });
    if (!isAnimating) {
      isAnimating = true;
      drawRipples();
    }
  }

  // マウス移動: 大きくゆっくりした波紋を間隔を空けて
  window.addEventListener('mousemove', (e) => {
    const now = Date.now();
    const dx = e.clientX - lastMouseX;
    const dy = e.clientY - lastMouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // 間隔を広げてゆったりした波紋に
    if (now - lastRippleTime > 180 || dist > 100) {
      addRipple(e.clientX, e.clientY, false);
      lastRippleTime = now;
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    }
  });

  // クリックで強い波紋
  window.addEventListener('click', (e) => {
    addRipple(e.clientX, e.clientY, true);
  });

  // タッチ対応
  window.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      const touch = e.touches[0];
      const now = Date.now();
      if (now - lastRippleTime > 180) {
        addRipple(touch.clientX, touch.clientY, false);
        lastRippleTime = now;
      }
    }
  }, { passive: true });

  window.addEventListener('touchstart', (e) => {
    if (e.touches.length > 0) {
      const touch = e.touches[0];
      addRipple(touch.clientX, touch.clientY, true);
    }
  }, { passive: true });

  function drawRipples() {
    rippleCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.radius += r.speed;
      r.opacity *= 0.985;

      if (r.opacity < 0.01 || r.radius > r.maxRadius) {
        ripples.splice(i, 1);
        continue;
      }

      // メタリックなリング（外側 - 銀色のハイライト）
      const grad = rippleCtx.createRadialGradient(r.x, r.y, r.radius * 0.85, r.x, r.y, r.radius);
      grad.addColorStop(0, `rgba(255, 255, 255, 0)`);
      grad.addColorStop(0.5, `rgba(220, 235, 240, ${r.opacity})`);
      grad.addColorStop(1, `rgba(125, 211, 232, ${r.opacity * 0.5})`);

      rippleCtx.beginPath();
      rippleCtx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
      rippleCtx.strokeStyle = grad;
      rippleCtx.lineWidth = 2;
      rippleCtx.stroke();

      // 内側のリング（シアンの光彩）
      if (r.radius > 25) {
        rippleCtx.beginPath();
        rippleCtx.arc(r.x, r.y, r.radius * 0.7, 0, Math.PI * 2);
        rippleCtx.strokeStyle = `rgba(125, 211, 232, ${r.opacity * 0.35})`;
        rippleCtx.lineWidth = 1;
        rippleCtx.stroke();
      }
    }

    // 波紋がなくなったらアニメーションを止める（パフォーマンス改善）
    if (ripples.length === 0) {
      isAnimating = false;
      return;
    }

    requestAnimationFrame(drawRipples);
  }

  // ============ To Do feature ============
  const STORAGE_KEY = 'clock_todos_v1';
  const todoListEl = document.getElementById('todo-list');
  const todoInputEl = document.getElementById('todo-input');
  const todoAddBtnEl = document.getElementById('todo-add-btn');
  const todoCountEl = document.getElementById('todo-count');

  let todos = loadTodos();

  function loadTodos() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  function saveTodos() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    } catch (e) {}
  }

  function addTodo(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    todos.push({
      id: Date.now() + '-' + Math.random().toString(36).slice(2, 7),
      text: trimmed,
      done: false
    });
    saveTodos();
    renderTodos();
  }

  function toggleTodo(id) {
    const t = todos.find(x => x.id === id);
    if (t) {
      t.done = !t.done;
      saveTodos();
      renderTodos();
    }
  }

  function deleteTodo(id) {
    todos = todos.filter(x => x.id !== id);
    saveTodos();
    renderTodos();
  }

  function renderTodos() {
    todoListEl.innerHTML = '';

    if (todos.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'todo-empty';
      empty.textContent = 'タスクはまだありません';
      todoListEl.appendChild(empty);
    } else {
      todos.forEach(t => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (t.done ? ' done' : '');

        const checkbox = document.createElement('div');
        checkbox.className = 'todo-checkbox' + (t.done ? ' checked' : '');
        checkbox.addEventListener('click', () => toggleTodo(t.id));

        const text = document.createElement('div');
        text.className = 'todo-text';
        text.textContent = t.text;

        const delBtn = document.createElement('button');
        delBtn.className = 'todo-delete';
        delBtn.textContent = '×';
        delBtn.title = '削除';
        delBtn.addEventListener('click', () => deleteTodo(t.id));

        li.appendChild(checkbox);
        li.appendChild(text);
        li.appendChild(delBtn);
        todoListEl.appendChild(li);
      });
    }

    const doneCount = todos.filter(t => t.done).length;
    todoCountEl.textContent = `${doneCount} / ${todos.length}`;
  }

  todoAddBtnEl.addEventListener('click', () => {
    addTodo(todoInputEl.value);
    todoInputEl.value = '';
    todoInputEl.focus();
  });

  todoInputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTodo(todoInputEl.value);
      todoInputEl.value = '';
    }
  });

  renderTodos();
</script>
</body>
</html>
